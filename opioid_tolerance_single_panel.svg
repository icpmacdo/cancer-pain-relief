<svg width="100%" viewBox="0 0 680 410" role="img" style="" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Opioid tolerance in one panel: fixed-dose effect decays below target while an escalating dose rides the target</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Analgesic effect is plotted against repeated doses over time. A relief target runs horizontally. The fixed-dose curve starts high and decays smoothly below the target. The escalating-dose curve sawtooths along the target, bumped back up at each dose increase marked with an up arrow. The vertical gap between the two curves is the tolerance being made up by extra dose.</desc>
